<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Code Narrator AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
</head>
<body>

  <!-- Animated background -->
  <div class="bg-grid"></div>

  <!-- Header -->
  <header class="app-header">
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2V9M9 21H5a2 2 0 0 1-2-2V9m0 0h18"/>
          </svg>
        </div>
        <div>
          <h1>Code Narrator <span class="accent">AI</span></h1>
        </div>
      </div>
    </div>
  </header>

  <!-- Workspace -->
  <main class="workspace">

    <!-- INPUT PANEL -->
    <section class="panel input-panel">
      <div class="panel-header">
        <div class="panel-title">
          <h2>Source Input</h2>
        </div>
      </div>

      <!-- Mode tabs -->
      <div class="mode-tabs" role="tablist">
        <button class="mode-tab active" data-mode="file" role="tab" aria-selected="true">
          <svg viewBox="0 0 20 20" fill="currentColor"><path d="M4 4a2 2 0 012-2h4l4 4v10a2 2 0 01-2 2H6a2 2 0 01-2-2V4z"/></svg>
          File
        </button>
        <button class="mode-tab" data-mode="folder" role="tab" aria-selected="false">
          <svg viewBox="0 0 20 20" fill="currentColor"><path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"/></svg>
          Folder
        </button>
        <button class="mode-tab" data-mode="paste" role="tab" aria-selected="false">
          <svg viewBox="0 0 20 20" fill="currentColor"><path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z"/><path fill-rule="evenodd" d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3zm-3 4a1 1 0 100 2h.01a1 1 0 100-2H7zm3 0a1 1 0 100 2h3a1 1 0 100-2h-3z" clip-rule="evenodd"/></svg>
          Paste Code
        </button>
      </div>

      <!-- File / Folder area -->
      <div class="input-area" id="fileArea">
        <div class="drop-zone" id="dropZone">
          <!-- hidden inputs managed by JS clicks -->
          <input type="file" id="fileInput"
            accept=".py,.js,.ts,.java,.cs,.cpp,.c,.go,.rb,.php,.swift,.kt,.rs,.txt,.html,.css,.json,.yaml,.yml,.md,.sh,.bash,.vue,.jsx,.tsx"
            class="file-hidden" />
          <input type="file" id="folderInput"
            webkitdirectory multiple
            class="file-hidden" />
          <div class="drop-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
            </svg>
          </div>
          <p class="drop-title">Drop your <span class="accent" id="dropModeLabel">file</span> here</p>
          <p class="drop-subtitle">or <span class="inline-link" id="browseBtn">click to browse</span></p>
          <p class="drop-hint" id="dropHint">Supports .py .js .ts .java .cs .go and more</p>
        </div>
        <div class="file-list" id="fileList"></div>
      </div>

      <!-- Paste area -->
      <div class="input-area hidden" id="pasteArea">
        <div class="code-editor-wrap">
          <div class="code-editor-header">
            <span class="editor-dots"><i></i><i></i><i></i></span>
            <span class="editor-lang">source code</span>
            <button type="button" class="icon-btn" id="clearCodeBtn" title="Clear">
              <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
            </button>
          </div>
          <textarea id="codeInput" spellcheck="false"
            placeholder="// Paste your source code here...&#10;// Python, JS, TS, Java, Go, C/C++, and more"></textarea>
        </div>
      </div>

      <!-- Analyze button -->
      <button id="analyzeBtn" type="button" class="analyze-btn" disabled>
        <span class="btn-glow"></span>
        <svg class="btn-icon" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.38z" clip-rule="evenodd"/>
        </svg>
        <span class="btn-label">Analyze Code</span>
      </button>

      <div class="progress-wrap hidden" id="progressWrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <!-- Per-file progress -->
      <div id="fileProgress" class="file-progress-track hidden"></div>

      <p class="status-msg" id="statusMsg" aria-live="polite"></p>
    </section>

    <!-- RESULTS PANEL -->
    <section class="panel results-panel" id="resultsPanel">
      <div class="panel-header">
        <div class="panel-title">
          <h2>Analysis Results</h2>
        </div>
        <span class="result-badge" id="resultBadge">Awaiting Input</span>
      </div>

      <div class="result-tabs" role="tablist">
        <button class="rtab active" data-pane="explanation" role="tab">
          <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"/></svg>
          Explanation
        </button>
        <button class="rtab" data-pane="steps" role="tab">
          <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 10a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 15a1 1 0 011-1h6a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd"/></svg>
          Steps
        </button>
        <button class="rtab" data-pane="diagram" role="tab">
          <svg viewBox="0 0 20 20" fill="currentColor"><path d="M2 11a1 1 0 011-1h2a1 1 0 011 1v5a1 1 0 01-1 1H3a1 1 0 01-1-1v-5zM8 7a1 1 0 011-1h2a1 1 0 011 1v9a1 1 0 01-1 1H9a1 1 0 01-1-1V7zM14 4a1 1 0 011-1h2a1 1 0 011 1v12a1 1 0 01-1 1h-2a1 1 0 01-1-1V4z"/></svg>
          Diagram
        </button>
      </div>

      <!-- Skeleton loader -->
      <div class="skeleton-wrap hidden" id="skeletonWrap">
        <div class="skeleton-line w-full"></div>
        <div class="skeleton-line w-4of5"></div>
        <div class="skeleton-line w-3of5"></div>
        <div class="skeleton-line w-4of5"></div>
        <div class="skeleton-line w-2of5"></div>
      </div>

      <!-- Pane: Explanation -->
      <div class="result-pane" id="pane-explanation">
        <div class="empty-state" id="emptyExplanation">
          <div class="empty-icon">&#128269;</div>
          <p>Submit code to see an explanation</p>
        </div>
        <p class="explanation-text hidden" id="explanation"></p>
      </div>

      <!-- Pane: Steps -->
      <div class="result-pane hidden" id="pane-steps">
        <div class="empty-state" id="emptySteps">
          <div class="empty-icon">&#128203;</div>
          <p>Submit code to see step-by-step breakdown</p>
        </div>
        <ol class="steps-timeline hidden" id="steps"></ol>
      </div>

      <!-- Pane: Diagram -->
      <div class="result-pane hidden" id="pane-diagram">
        <div class="empty-state" id="emptyDiagram">
          <div class="empty-icon">&#127760;</div>
          <p>Submit code to generate a flow diagram</p>
        </div>
        <div class="diagram-wrap hidden" id="diagramWrap">
          <div class="diagram-toolbar">
            <button type="button" class="toolbar-btn" id="copyMermaidBtn" disabled>
              <svg viewBox="0 0 20 20" fill="currentColor"><path d="M8 3a1 1 0 011-1h2a1 1 0 110 2H9a1 1 0 01-1-1z"/><path d="M6 3a2 2 0 00-2 2v11a2 2 0 002 2h8a2 2 0 002-2V5a2 2 0 00-2-2 3 3 0 01-3 3H9a3 3 0 01-3-3z"/></svg>
              Copy Mermaid
            </button>
          </div>
          <div id="diagram" class="diagram-render"></div>
        </div>
      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
