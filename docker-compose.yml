# docker-compose.yml — CodeNarrator-AI (Ollama bundled inside container)
#
# Server: AWS g5.xlarge — 4 vCPU (AMD EPYC 7R32), 16 GB RAM, NVIDIA A10G 24 GB
#
# Usage:
#   docker compose up -d          # start the service
#   docker compose logs -f app    # follow app logs
#   docker compose down            # stop everything

services:
  app:
    build: .
    container_name: codenarrator-app
    ports:
      - "8081:8081"
    environment:
      HOST: "0.0.0.0"
      PORT: "8081"
      OLLAMA_BASE_URL: "http://localhost:11434"
      OLLAMA_MODEL: "llama3.2:3b"
      OLLAMA_TIMEOUT_SECONDS: "900"
      BATCH_SIZE: "5"
      JOB_STREAM_POLL_SECONDS: "15"
      JOB_STREAM_IDLE_TIMEOUT_SECONDS: "1800"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        limits:
          cpus: "3.5"
          memory: 14G
        reservations:
          cpus: "2.0"
          memory: 8G
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  ollama_data:
